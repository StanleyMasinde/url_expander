name: CI

on:
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install target
      run: rustup target add x86_64-unknown-linux-gnu

    - name: Run tests
      run: cargo test

    - name: Build
      run: cargo build -r --target x86_64-unknown-linux-gnu
